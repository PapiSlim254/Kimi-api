services:

  # ── API Server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bodamoja-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/bodamoja
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      DARAJA_CONSUMER_KEY: ${DARAJA_CONSUMER_KEY}
      DARAJA_CONSUMER_SECRET: ${DARAJA_CONSUMER_SECRET}
      DARAJA_SHORTCODE: ${DARAJA_SHORTCODE}
      DARAJA_PASSKEY: ${DARAJA_PASSKEY}
      DARAJA_CALLBACK_URL: ${DARAJA_CALLBACK_URL}
      DARAJA_B2C_SHORTCODE: ${DARAJA_B2C_SHORTCODE}
      DARAJA_INITIATOR_NAME: ${DARAJA_INITIATOR_NAME}
      DARAJA_SECURITY_CREDENTIAL: ${DARAJA_SECURITY_CREDENTIAL}
      BASE_URL: ${BASE_URL}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bodamoja-net

  # ── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: bodamoja-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bodamoja
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bodamoja-net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bodamoja-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bodamoja-net

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bodamoja-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - bodamoja-net

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:
  certbot-certs:
  certbot-www:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  bodamoja-net:
    driver: bridge
