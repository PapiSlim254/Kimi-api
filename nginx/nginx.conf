events {
  worker_connections 1024;
}

http {

  # Rate limiting zone — must be in http{} context, not server{}
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

  # ── Bootstrap: HTTP only (used before TLS cert exists) ─────────────────────
  # Once you have a cert, this block still handles renewal + redirect.
  server {
    listen 80;
    server_name api.bodamoja.com;

    # Required for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  # This block only activates once the TLS cert exists.
  # On a fresh server, comment this block out, get your cert via the HTTP
  # block above, then uncomment it.
  server {
    listen 443 ssl;
    server_name api.bodamoja.com;

    ssl_certificate     /etc/letsencrypt/live/api.bodamoja.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bodamoja.com/privkey.pem;

    # Recommended TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Apply rate limiting (zone defined in http{} above)
    limit_req zone=api burst=50 nodelay;

    # Forward requests to the API container
    location / {
      proxy_pass         http://api:3000;
      proxy_http_version 1.1;

      # Required for WebSockets (live location tracking)
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }
  }
}
