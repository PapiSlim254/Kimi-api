events {
  worker_connections 1024;
}

http {

  # ── Redirect all HTTP to HTTPS ─────────────────────────────────────────────
  server {
    listen 80;
    server_name api.bodamoja.com;

    # Required for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.bodamoja.com;

    ssl_certificate     /etc/letsencrypt/live/api.bodamoja.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bodamoja.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req zone=api burst=50 nodelay;

    # Forward requests to the API container
    location / {
      proxy_pass         http://api:3000;
      proxy_http_version 1.1;

      # Required for WebSockets
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 60s;
    }
  }
}
